mode: 'only_train' # 'train_full', 'only_train', 'only_rec', 'only_prior', 'only_posterior'
dataset: 'monte_carlo' # 'simulated_dataset_3'
GPU: True
seed: 0
train_dir: '/datasets/Simu_OU' #   
save_path: '/benchmark/multiNODEs/monte_carlo'
exp_name: 'OU_with_best_config_Ntrain200' # OU_with_best_config
                
# Specific training parameters
num_epochs: 3000
lr: 0.006019
n_long_var: 3
t_visits: 200
static_data: True
z_dim_static: 1
s_dim_static: 6
solver: 'Normal' # 'Adjoint', 'Normal', 'Julia'
method_solver: 'dopri5' # 'dopri5', 'dopri8', 'bosh3', 'fehlberg2', 'adaptive_heun'
rtol: 1.0e-3
atol: 1.0e-3
step_size_solver: 1e-3
type_enc: 'LSTM' # 'RNN', 'LSTM'
type_dec: 'orig' # 'RNN', 'LSTM', 'Orig'
drop_dec: 0.042104
act_dec: 'tanh' # 'none', 'tanh', 'relu'
num_ode_layers: 2 # 1, 2, 3
act_ode: 'tanh' # 'none', 'tanh', 'relu'
act_rnn: 'relu' # 'none', 'relu', 'tanh'
batch_norm_static: True
batch_size: 0.806525 # in percentage of the dataset
from_best: False
latent_dim: 1.106836 # in percentage of the long variables
epoch_init: 1
nhidden: 5.143668
rnn_nhidden_dec: 0.903757
rnn_nhidden_enc: 0.161157
scaling_ELBO: 0.432579
save_freq: 300
print_freq: 1

# Specific simulation parameters
time_max: 1
time_min: 0
time_steps: 200
s_prob: [] # vector with propability of s during prior sampling
sigma_long: 1
sigma_stat: 1
N_pop: 50
