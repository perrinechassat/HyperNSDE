# General things
optuna_study: 'optuna_HyperNDEs_PPMI'
GPU: True
dataset: 'PPMI'
save_dir: '/experiments/optuna_results/HyperNDEs'
file_dataset: ''
seed: 0

# Training parameters
# batch_size: to optimize
# lr: to optimize
num_epochs: 600
patience: 10
print_freq: 10
loss_aggregation: 'LS' 
# loss_scaling_ode: to optimize
# loss_scaling_sde: to optimize
# loss_scaling_poisson: to optimize
loss_scaling_static: 1.0

long_normalization: 'zscore'
max_norm: 1.0

# Data parameters
n_long_var: 15
t_visits: 686
    
# Static data parameters
static_data: True
# z_dim_static: to optimize
# s_dim_static: to optimize
batch_norm_static: True
  
# Latent model parameters
# num_ode_layers: 2
act_ode: 'Tanh'
# num_hypernet_layers: 2
act_hypernetwork: 'ReLU'
# latent_dim: 3 to optimize
# nhidden: 16 to optimize
solver: 'Normal' #'Adjoint'
method_solver': 'dopri5'                              
rtol: 0.001                                          
atol: 0.0001 

estim_event_rate: True
lambda_mlp_size: 64
lambda_num_layers: 1
lambda_act: 'Tanh'
lambda_dim: 15 # dep of the datasets (same missing between features or not)

time_normalization: True
# save_freq: 200
# weight_decay_diff: to optimize
# weight_decay_drift: to optimize

# SDE
latent_model: 'HyperNDEs'                             # 'MultiNDEs', 'StatMoNDEs', 'HyperNDEs'
sde: True                                 # To change to True when using SDEs
sde_type: 'stratonovich'
noise_type: 'diagonal'
diff_shape: 1
diff_mlp_size: 64
diff_mlp_num_layers: 1
act_diff: 'LipSwish'
res_drift_mlp_size: 16
res_drift_mlp_num_layers: 1
act_res_drift: 'LipSwish'

# Training SDE 
sde_training: 'MMD_PySig'           # 'MMD_FDM', 'MMD_SigKer'
subtract_initial_point: True
# sigma_kernel: to optimize (1.0 default)
kernel_type: 'rbf'
max_batch_kernel: 16
sde_lead_lag: False
sde_split_training: True

# Decoder parameters
type_dec: 'nonlinear'
act_dec: 'Tanh'
# nhidden_dec: 32
drop_dec: 0.0

# Encoder parameters 
type_enc: none
fixed_init_cond: True
t0_2_static: True